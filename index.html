    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }

    /* Light/Dark Mode */
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d2b;
      --bg-tertiary: #22263a;
      --text-primary: #f0f0f4;
      --text-secondary: #c8c9d2;
      --text-muted: #6b7084;
      --accent: #e8cda0;
      --accent-dark: #d4b89a;
      --success: #10b981;
      --error: #ef4444;
    }
    
    body.light-mode {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f7;
      --bg-tertiary: #efefef;
      --text-primary: #1a1a1a;
      --text-secondary: #4a4a4a;
      --text-muted: #888888;
      --accent: #d4a574;
      --accent-dark: #c09560;
    }
    
    body { background: var(--bg-primary); color: var(--text-primary); transition: background 0.3s, color 0.3s; }
    
    .card-flip { perspective: 1200px; }
    .card-inner { transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); transform-style: preserve-3d; position: relative; }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-front, .card-back { backface-visibility: hidden; position: absolute; inset: 0; border-radius: 1.5rem; }
    .card-back { transform: rotateY(180deg); }
    
    .tag { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.2s; }
    .filter-btn { transition: all 0.25s; cursor: pointer; }
    .filter-btn:hover { transform: scale(1.05); }
    .filter-btn.active { transform: scale(1.08); box-shadow: 0 4px 12px rgba(232, 205, 160, 0.3); }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    
    .animate-in { animation: slideUp 0.4s ease-out; }
    .animate-down { animation: slideDown 0.4s ease-out; }
    .toast { animation: slideUp 0.3s ease-out; }
    .spinner { animation: spin 1s linear infinite; }
    
    .card-photo { max-width: 100%; max-height: 280px; border-radius: 1rem; margin-bottom: 1.5rem; object-fit: cover; box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2); }
    
    .btn-floating { position: relative; overflow: hidden; }
    .btn-floating::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255, 255, 255, 0.2); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; }
    .btn-floating:active::before { width: 300px; height: 300px; }
    
    .header-bar { box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1); }
    .card-container { box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15); }
    
    .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
    
    /* Responsive */
    @media (max-width: 640px) {
      .card-photo { max-height: 200px; }
      .tag { font-size: 0.65rem; padding: 3px 8px; }
    }
  </style>

let userCards = [];
let allData = [];
let regions = [];
let activeFilter = null;
let filtered = [];
let idx = 0;
let isDarkMode = true;
let currentAudioContext = null;

// Utility: Play sound on card flip
function playFlipSound() {
  try {
    if (!currentAudioContext) {
      currentAudioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    const ctx = currentAudioContext;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.1);
  } catch (e) {}
}

// Theme toggle
function toggleTheme() {
  isDarkMode = !isDarkMode;
  document.getElementById('app-body').classList.toggle('light-mode');
  const themeBtn = document.getElementById('btn-theme');
  themeBtn.innerHTML = isDarkMode ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
  lucide.createIcons();
  localStorage.setItem('miologia-theme', isDarkMode ? 'dark' : 'light');
}

// Init theme from localStorage
function initTheme() {
  const saved = localStorage.getItem('miologia-theme');
  if (saved === 'light') {
    isDarkMode = false;
    document.getElementById('app-body').classList.add('light-mode');
    document.getElementById('btn-theme').innerHTML = '<i data-lucide="moon"></i>';
  }
}

// Data SDK Handler
const dataHandler = {
  onDataChanged(data) {
    userCards = data || [];
    updateDataAndFilters();
  }
};

async function initDataSDK() {
  const result = await window.dataSdk.init(dataHandler);
  if (!result.isOk) {
    showToast('Erro ao inicializar banco de dados', 'error');
  }
}

function updateDataAndFilters() {
  allData = [...DATA, ...userCards];
  regions = [...new Set(allData.map(d => d.regiao))].sort();
  renderFilters();
  applyFilter();
}

function renderFilters() {
  const filtersEl = document.getElementById('filters');
  filtersEl.innerHTML = '';
  regions.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn tag';
    btn.style.cssText = 'background:var(--bg-tertiary); color:var(--text-secondary); border:1px solid var(--bg-primary);';
    btn.textContent = r;
    btn.addEventListener('click', () => {
      activeFilter === r ? (activeFilter = null) : (activeFilter = r);
      applyFilter();
    });
    filtersEl.appendChild(btn);
  });
}

function applyFilter() {
  filtered = activeFilter ? allData.filter(d => d.regiao === activeFilter) : [...allData];
  idx = 0;
  document.querySelectorAll('.filter-btn').forEach(b => {
    const isActive = b.textContent === activeFilter;
    b.style.background = isActive ? 'var(--accent)' : 'var(--bg-tertiary)';
    b.style.color = isActive ? 'var(--bg-primary)' : 'var(--text-secondary)';
  });
  renderCard();
}

function renderCard() {
  if (!filtered.length) return;
  const item = filtered[idx];
  const inner = document.getElementById('card-inner');
  inner.classList.remove('flipped');
  inner.parentElement.classList.add('animate-in');
  setTimeout(() => inner.parentElement.classList.remove('animate-in'), 400);

  document.getElementById('current-num').textContent = idx + 1;
  document.getElementById('total-num').textContent = filtered.length;
  document.getElementById('card-name').textContent = item.nome;

  const tagsEl = document.getElementById('card-tags');
  tagsEl.innerHTML = `<span class="tag" style="background:var(--accent); color:var(--bg-primary);">${item.regiao}</span>`;

  document.getElementById('card-type-label').textContent = item.tipo === 'musculo' ? '💪 Músculo' : '🦴 Estrutura';

  const photoFront = document.getElementById('photo-front');
  if (item.foto_url) {
    photoFront.innerHTML = `<img src="${item.foto_url}" alt="Foto" class="card-photo" loading="lazy" onerror="this.style.display='none';">`;
    photoFront.style.display = 'block';
  } else {
    photoFront.innerHTML = '';
    photoFront.style.display = 'none';
  }

  const det = document.getElementById('card-details');
  let html = '';
  const field = (label, val) => val ? `<div><p class="font-semibold uppercase tracking-wide" style="color:var(--accent);margin-bottom:4px;font-size:0.75rem;">${label}</p><p style="color:var(--text-secondary);">${val}</p></div>` : '';

  if (item.tipo === 'estrutura') {
    html = field('Definição', item.definicao);
  } else {
    html = field('Classificação', item.classificacao) + field('Fixação Proximal', item.fixacao_proximal) + field('Inserção Distal', item.insercao_distal) + field('Ação', item.acao);
  }
  det.innerHTML = html;

  const photoBack = document.getElementById('photo-back');
  if (item.foto_url) {
    photoBack.innerHTML = `<img src="${item.foto_url}" alt="Foto" class="card-photo" loading="lazy" onerror="this.style.display='none';">`;
    photoBack.style.display = 'block';
  } else {
    photoBack.innerHTML = '';
    photoBack.style.display = 'none';
  }

  lucide.createIcons();
}

function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.style.cssText = `position:fixed;bottom:20px;left:20px;right:20px;max-width:400px;padding:14px 18px;border-radius:0.75rem;font-size:14px;z-index:9999;font-weight:500;${type === 'error' ? 'background:var(--error);color:white;' : 'background:var(--success);color:white;'}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Camera
document.getElementById('btn-camera').addEventListener('click', () => document.getElementById('file-camera').click());
document.getElementById('file-camera').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (event) => {
    const base64 = event.target.result;
    if (!filtered.length) return showToast('Nenhum card selecionado', 'error');
    const item = filtered[idx];
    const updated = { ...item, foto_url: base64 };
    if (item.__backendId) {
      const result = await window.dataSdk.update(updated);
      if (result.isOk) {
        showToast('Foto adicionada ✓');
        renderCard();
      } else {
        showToast('Erro ao adicionar foto', 'error');
      }
    } else {
      const newCard = { id: `custom-${Date.now()}`, nome: item.nome, categoria: item.categoria, regiao: item.regiao, tipo: item.tipo, classificacao: item.classificacao || '', fixacao_proximal: item.fixacao_proximal || '', insercao_distal: item.insercao_distal || '', acao: item.acao || '', definicao: item.definicao || '', foto_url: base64 };
      const result = await window.dataSdk.create(newCard);
      if (result.isOk) {
        showToast('Card criado com foto ✓');
      } else {
        showToast('Erro ao criar card', 'error');
      }
    }
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// Card camera button
document.getElementById('btn-card-camera').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('file-camera').click();
});

// Card import button
document.getElementById('btn-card-import').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('file-import').click();
});

// Import JSON
document.getElementById('btn-import').addEventListener('click', () => document.getElementById('file-import').click());
document.getElementById('file-import').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (event) => {
    try {
      const json = JSON.parse(event.target.result);
      const cards = Array.isArray(json) ? json : [json];
      let imported = 0;
      for (const card of cards) {
        if (imported + userCards.length >= 999) {
          showToast('Limite de 999 cards atingido', 'error');
          break;
        }
        const result = await window.dataSdk.create({ id: `custom-${Date.now()}-${Math.random()}`, ...card });
        if (result.isOk) imported++;
      }
      showToast(`${imported} cards importados ✓`);
    } catch (err) {
      showToast('Erro ao importar JSON', 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// Navigation
document.getElementById('btn-prev').addEventListener('click', (e) => {
  e.stopPropagation();
  if (filtered.length) { idx = (idx - 1 + filtered.length) % filtered.length; renderCard(); }
});
document.getElementById('btn-next').addEventListener('click', (e) => {
  e.stopPropagation();
  if (filtered.length) { idx = (idx + 1) % filtered.length; renderCard(); }
});
document.getElementById('btn-shuffle').addEventListener('click', (e) => {
  e.stopPropagation();
  for (let i = filtered.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [filtered[i], filtered[j]] = [filtered[j], filtered[i]]; }
  idx = 0; renderCard();
});
