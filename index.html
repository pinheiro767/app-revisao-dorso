
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas de Miologia</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:Arial;margin:0;background:#0a1020;color:white}
header{padding:16px;text-align:center;background:#121a33}
.container{padding:16px}
button{padding:12px;margin:6px;border:none;border-radius:10px;background:#3a6cff;color:white;cursor:pointer}
.tabs button{background:#1f2e5a}
.gallery img{width:100px;margin:6px;border-radius:8px}
.hidden{display:none}
</style>
</head>

<body>

<header>Atlas de Miologia</header>

<div class="container">

<div id="menu">
<button onclick="openMuscle('Trapézio')">Trapézio</button>
<button onclick="openMuscle('Latíssimo do dorso')">Latíssimo do dorso</button>
<button onclick="openMuscle('Reto do abdome')">Reto do abdome</button>
</div>

<div id="muscleScreen" class="hidden">

<h2 id="muscleTitle"></h2>

<div class="tabs">
<button onclick="selectTab('acao')">Ação</button>
<button onclick="selectTab('fixacao')">Fixação proximal</button>
<button onclick="selectTab('insercao')">Inserção</button>
</div>

<br>

<input type="file" accept="image/*" capture="environment" onchange="addPhoto(event)">

<div id="gallery" class="gallery"></div>

<br>
<button onclick="back()">Voltar</button>

</div>

</div>

<script>

let currentMuscle = ""
let currentTab = "acao"

function openMuscle(name){
currentMuscle = name
document.getElementById("menu").style.display="none"
document.getElementById("muscleScreen").classList.remove("hidden")
document.getElementById("muscleTitle").innerText=name
loadGallery()
}

function back(){
document.getElementById("menu").style.display="block"
document.getElementById("muscleScreen").classList.add("hidden")
}

function selectTab(tab){
currentTab = tab
loadGallery()
}

function storageKey(){
return currentMuscle + "_" + currentTab
}

function loadGallery(){
let gallery=document.getElementById("gallery")
gallery.innerHTML=""

let data=JSON.parse(localStorage.getItem(storageKey())||"[]")

data.forEach((src,i)=>{
let img=document.createElement("img")
img.src=src
gallery.appendChild(img)
})
}

function addPhoto(e){

let file=e.target.files[0]
let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(localStorage.getItem(storageKey())||"[]")
data.push(reader.result)
localStorage.setItem(storageKey(),JSON.stringify(data))

loadGallery()

}

reader.readAsDataURL(file)

}

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js')
}

</script>

</body>
</html>
