<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1020">
<title>Atlas de Miologia</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg:#0a1020; --bg2:#101933; --line:rgba(255,255,255,.10);
  --text:#eef5ff; --muted:#a9bad3; --cyan:#74d8ff; --pink:#ff93c2;
}
*{box-sizing:border-box}
body {
  margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text); background:linear-gradient(180deg,var(--bg),var(--bg2)); min-height:100vh;
}
header {
  padding:18px 16px; position:sticky; top:0; z-index:10;
  background:rgba(10,16,32,.94); backdrop-filter: blur(10px); border-bottom:1px solid var(--line);
}
.wrap{max-width:980px; margin:0 auto; padding:16px}
h1{margin:0; font-size:1.35rem}
.sub{margin-top:6px; color:var(--muted); font-size:.95rem}
.search {
  width:100%; margin-top:14px; padding:14px 16px; border-radius:16px; border:1px solid var(--line);
  background:#0d1730; color:var(--text); font-size:1rem; outline:none;
}
.list{display:grid; gap:10px; padding-bottom:24px}
.item {
  width:100%; text-align:left; border:none; border-radius:18px; padding:16px; cursor:pointer;
  background:linear-gradient(180deg,rgba(18,29,58,.98),rgba(12,18,36,.98));
  color:var(--text); border:1px solid var(--line); box-shadow:0 12px 24px rgba(0,0,0,.18);
  font-size:1rem; font-weight:700;
}
.item small{display:block; color:var(--muted); margin-top:6px; font-weight:500}
.screen{display:none}
.screen.active{display:block}
.hero-card,.panel {
  border:1px solid var(--line); border-radius:24px;
  background:linear-gradient(180deg,rgba(18,29,58,.96),rgba(10,16,32,.94));
  box-shadow:0 18px 36px rgba(0,0,0,.22);
}
.hero-card{padding:20px}
.tabs{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px}
.tab {
  border:none; border-radius:14px; padding:12px 14px; cursor:pointer; font-weight:800;
  background:rgba(255,255,255,.06); color:var(--text); border:1px solid rgba(255,255,255,.08);
}
.tab.active{background:linear-gradient(135deg,rgba(116,216,255,.20),rgba(255,147,194,.18)); border-color:rgba(116,216,255,.28)}
.panel{padding:18px; margin-top:16px}
.panel h3{margin:0 0 10px; color:var(--cyan)}
.value{white-space:pre-wrap; line-height:1.55}
.back {
  margin-top:16px; border:none; border-radius:16px; padding:14px 18px; cursor:pointer; font-weight:800;
  background:linear-gradient(135deg,#ffc1da,var(--pink)); color:#4b1230;
}
.empty{color:var(--muted)}
.badge {
  display:inline-block; padding:6px 10px; border-radius:999px; margin-bottom:8px;
  background:rgba(116,216,255,.12); color:var(--cyan); border:1px solid rgba(116,216,255,.22);
}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Atlas de Miologia</h1>
    <div class="sub">1 músculo por tela • 3 abas anatômicas • uso offline</div>
    <input id="search" class="search" placeholder="Buscar músculo, estrutura ou número do roteiro">
  </div>
</header>

<main class="wrap">
  <section id="listaScreen" class="screen active">
    <div id="lista" class="list"></div>
  </section>

  <section id="detalheScreen" class="screen">
    <div class="hero-card">
      <div id="musculoNumero" class="badge"></div>
      <h2 id="musculoNome" style="margin:.4rem 0 0;font-size:1.5rem;"></h2>
      <div class="tabs">
        <button class="tab active" data-tab="acao">Ação</button>
        <button class="tab" data-tab="fixacao">Fixação proximal</button>
        <button class="tab" data-tab="insercao">Inserção</button>
      </div>
    </div>

    <div class="panel">
      <h3 id="tituloAba">Ação</h3>
      <div id="conteudoAba" class="value"></div>
    </div>

    <button id="backBtn" class="back" type="button">← Voltar para a lista</button>
  </section>
</main>

const listaScreen = document.getElementById('listaScreen');
const detalheScreen = document.getElementById('detalheScreen');
const lista = document.getElementById('lista');
const search = document.getElementById('search');
const musculoNome = document.getElementById('musculoNome');
const musculoNumero = document.getElementById('musculoNumero');
const tituloAba = document.getElementById('tituloAba');
const conteudoAba = document.getElementById('conteudoAba');
const backBtn = document.getElementById('backBtn');
const tabs = Array.from(document.querySelectorAll('.tab'));

let atual = null;
let abaAtual = 'acao';

function renderLista(q='') {
  const termo = (q || '').toLowerCase().trim();
  lista.innerHTML = '';
  const filtrados = MUSCULOS.filter(m => m.nome.toLowerCase().includes(termo));

  if (!filtrados.length) {
    lista.innerHTML = '<div class="panel empty">Nenhum item encontrado.</div>';
    return;
  }

  filtrados.forEach((m) => {
    const btn = document.createElement('button');
    btn.className = 'item';
    btn.type = 'button';
    btn.innerHTML = m.nome + '<small>Toque para abrir a ficha anatômica</small>';
    btn.addEventListener('click', () => abrirMusculo(m));
    lista.appendChild(btn);
  });
}

function abrirMusculo(m) {
  atual = m;
  abaAtual = 'acao';
  listaScreen.classList.remove('active');
  detalheScreen.classList.add('active');
  musculoNome.textContent = m.nome;
  const found = m.nome.match(/^\s*([0-9]+|[a-z])\./);
  musculoNumero.textContent = found ? ('Roteiro: ' + found[1]) : 'Roteiro prático';
  tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === 'acao'));
  renderAba();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderAba() {
  if (!atual) return;
  const mapa = {
    acao: ['Ação', atual.acao],
    fixacao: ['Fixação proximal', atual.fixacao],
    insercao: ['Inserção', atual.insercao]
  };
  tituloAba.textContent = mapa[abaAtual][0];
  conteudoAba.textContent = mapa[abaAtual][1] || '—';
}

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    abaAtual = tab.dataset.tab;
    tabs.forEach(t => t.classList.toggle('active', t === tab));
    renderAba();
  });
});

backBtn.addEventListener('click', () => {
  detalheScreen.classList.remove('active');
  listaScreen.classList.add('active');
});

search.addEventListener('input', e => renderLista(e.target.value));
renderLista();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  });
}
</script>
